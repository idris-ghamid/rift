name: rift_example
description: Comprehensive example app demonstrating all Rift database features
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  rift:
    path: ../
  rift_flutter:
    path: ../../rift_flutter/
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  rift:
    path: ../
  rift_flutter:
    path: ../../rift_flutter/

flutter:
  uses-material-design: true
  assets:
    - assets/idris.jpg
    - assets/idrisium corp.jpg
